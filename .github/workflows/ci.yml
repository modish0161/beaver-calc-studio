name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend – Lint, Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high || true

      - name: Lint (ESLint)
        run: npx eslint src --ext .ts,.tsx --max-warnings 0 || true

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test -- --run

      - name: Build
        run: npm run build

      - name: Upload build artefact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  backend:
    name: Backend – Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: beaver_calc_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install test dependencies
        run: pip install pytest pytest-cov

      - name: Check for known vulnerabilities
        run: pip install pip-audit && pip-audit || true

      - name: Lint (ruff)
        run: pip install ruff && ruff check beaver_calc/ || true

      - name: Run tests
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/beaver_calc_test
          SECRET_KEY: ci-test-secret
          JWT_SECRET_KEY: ci-test-jwt-secret
          FLASK_ENV: testing
        run: pytest --cov=beaver_calc --cov-report=term-missing -v

  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -t beaver-frontend ./frontend

      - name: Build backend image
        run: docker build -t beaver-backend ./backend

  smoke:
    name: Smoke Test – API Health
    runs-on: ubuntu-latest
    needs: [backend]
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start server & check health
        env:
          SECRET_KEY: ci-smoke-secret
          JWT_SECRET_KEY: ci-smoke-jwt
          FLASK_ENV: testing
        run: |
          python -c "
          from beaver_calc import create_app
          app = create_app()
          client = app.test_client()
          resp = client.get('/api/health')
          assert resp.status_code == 200, f'Health check failed: {resp.status_code}'
          data = resp.get_json()
          assert data.get('status') == 'healthy', f'Unexpected status: {data}'
          print('Smoke test PASSED — /api/health returned healthy')
          "

      - name: Verify calculator registry
        env:
          SECRET_KEY: ci-smoke-secret
          JWT_SECRET_KEY: ci-smoke-jwt
          FLASK_ENV: testing
        run: |
          python -c "
          from beaver_calc import create_app
          app = create_app()
          client = app.test_client()
          resp = client.get('/api/calculators')
          assert resp.status_code == 200, f'Calculators endpoint failed: {resp.status_code}'
          data = resp.get_json()
          count = len(data.get('calculators', []))
          assert count >= 90, f'Expected >= 90 calculators, got {count}'
          print(f'Smoke test PASSED — {count} calculators registered')
          "

